            downloadAnchor.click();
            downloadAnchor.remove();
            alert("✅ Video list exported! Saved as streamhub_videos_backup.json on your PC.");
        }

        function importList(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported) && imported.length > 0) {
                        videoList = imported;
                        saveVideos();
                        populateCategories();
                        updateMainGrid();
                        alert(`✅ Successfully imported ${imported.length} videos from your PC!`);
                    } else {
                        alert("Invalid file format");
                    }
                } catch (err) {
                    alert("Error reading file: " + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // reset input
        }

        function init() {
            showSkeletons();
            setTimeout(() => {
                populateCategories();
                const params = new URLSearchParams(window.location.search);
                const videoId = params.get('v');
                updateMainGrid();
                if(videoId) openPlayer(parseInt(videoId));
            }, 800);
        }

        function showSkeletons() {
            document.getElementById('videoGrid').innerHTML = Array(8).fill(0).map(() => `
                <div class="card"><div class="video-prev skeleton"></div><div class="info"><div class="skeleton" style="height:20px; width:80%; border-radius:4px;"></div></div></div>
            `).join('');
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        function setTab(t, btn) {
            currentTab = t;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateMainGrid();
        }

        // MAIN GRID SEARCH + RANDOM FOR "ALL" + LATEST SORT
        function updateMainGrid() {
            const searchInput = document.getElementById('mainSearchBar');
            const search = searchInput.value.trim();
            
            // SECRET ADMIN TRIGGER
            if (search === '123@Admin#') {
                searchInput.value = '';
                openAdmin();
                return;
            }

            // Close player if open when searching
            const modal = document.getElementById('videoModal');
            if (modal.style.display === "block") {
                closePlayer();
            }

            let filtered = videoList.filter(v => v.title.toLowerCase().includes(search.toLowerCase()));

            if (currentTab === "Latest") {
                filtered.sort((a, b) => b.id - a.id);
            } else if (currentTab === "All") {
                filtered = filtered.sort(() => Math.random() - 0.5);
            } else {
                filtered = filtered.filter(v => v.tags.includes(currentTab));
            }

            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = data.map(v => `
                <div class="card" onclick="openPlayer(${v.id})">
                    <div class="video-prev">
                        <video class="mini" loop onmouseenter="this.play(); this.muted=false" onmouseleave="this.pause(); this.muted=true" muted>
                            <source src="${v.url}" type="video/mp4">
                        </video>
                    </div>
                    <div class="info"><p class="title">${v.title}</p></div>
                </div>
            `).join('');
        }

        // PLAYER LOGIC + AUTO PiP ON SCROLL (only when <40% visible)
        function openPlayer(id) {
            const v = videoList.find(x => x.id === id);
            if(!v) return;
            currentPlayingId = id;
            vid.src = v.url;
            document.getElementById('playingTitle').innerText = v.title;
            document.getElementById('viewCount').innerText = Math.floor(Math.random() * 50000 + 1000).toLocaleString() + " views";
            document.getElementById('videoModal').style.display = "block";
            
            window.history.pushState({}, '', `?v=${id}`); 
            vid.play();
            playBtn.innerText = "⏸";
            renderRelated(videoList.filter(item => item.id !== id));

            setupPiPObserver();
        }

        function setupPiPObserver() {
            const playerSection = document.querySelector('.main-player-section');
            if (!playerSection) return;

            if (piPObserver) piPObserver.disconnect();

            piPObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const modalVisible = document.getElementById('videoModal').style.display === "block";
                    if (modalVisible && !vid.paused) {
                        if (entry.intersectionRatio < 0.4) {
                            if (!document.pictureInPictureElement) {
                                vid.requestPictureInPicture().catch(() => {});
                            }
                        } else {
                            if (document.pictureInPictureElement) {
                                document.exitPictureInPicture().catch(() => {});
                            }
                        }
                    }
                });
            }, { threshold: 0.4 });

            piPObserver.observe(playerSection);
        }

        // SIDEBAR SEARCH LOGIC
        function searchSidebar() {
            const term = document.getElementById('sidebarSearch').value.toLowerCase();
            const filtered = videoList.filter(v => v.id !== currentPlayingId && v.title.toLowerCase().includes(term));
            renderRelated(filtered);
        }

        function renderRelated(list) {
            nextVideoId = list[0]?.id || null;
            document.getElementById('relatedGrid').innerHTML = list.slice(0, 10).map(v => `
                <div class="side-card" onclick="openPlayer(${v.id})">
                    <div class="side-thumb"><video muted><source src="${v.url}"></video></div>
                    <div style="overflow:hidden;">
                        <p class="side-title" style="color:var(--text)">${v.title}</p>
                        <span style="font-size:10px; color:var(--secondary)">${v.tags[0]}</span>
                    </div>
                </div>
            `).join('');
        }

        // CONTROLS
        function togglePlay() { vid.paused ? vid.play() : vid.pause(); playBtn.innerText = vid.paused ? "▶" : "⏸"; }
        
        function updateVolume(val) {
            vid.volume = val; vid.muted = (val == 0);
            document.getElementById('muteBtn').innerText = val == 0 ? "🔇" : "🔊";
        }
        function toggleMute() {
            vid.muted = !vid.muted;
            const slider = document.getElementById('volSlider');
            document.getElementById('muteBtn').innerText = vid.muted ? "🔇" : "🔊";
            slider.value = vid.muted ? 0 : (vid.volume || 1);
        }

        function changeSpeed() {
            let current = Number(vid.playbackRate);
            let nextSpeed;
            if (current === 1.0) nextSpeed = 1.5;
            else if (current === 1.5) nextSpeed = 2.0;
            else if (current === 2.0) nextSpeed = 0.5;
            else nextSpeed = 1.0;
            
            vid.playbackRate = nextSpeed;
            document.getElementById('speedDisplay').innerText = nextSpeed.toFixed(1) + "x";
        }

        function toggleTheater() { document.getElementById('modalBody').classList.toggle('theater'); }
        function toggleFullscreen() { document.getElementById('pWrapper').requestFullscreen(); }
        function togglePiP() { 
            if (document.pictureInPictureElement) document.exitPictureInPicture();
            else vid.requestPictureInPicture(); 
        }
        
        function shareVideo() {
            navigator.clipboard.writeText(window.location.href);
            alert("Video Link Copied!");
            document.getElementById('customMenu').style.display = 'none';
        }

        function closePlayer() {
            document.getElementById('videoModal').style.display = "none";
            document.getElementById('modalBody').classList.remove('theater');
            document.getElementById('sidebarSearch').value = "";
            window.history.pushState({}, '', window.location.pathname);
            vid.pause(); vid.src = "";
            currentPlayingId = null;

            if (piPObserver) {
                piPObserver.disconnect();
                piPObserver = null;
            }
            if (document.pictureInPictureElement) {
                document.exitPictureInPicture().catch(() => {});
            }
        }

        // GESTURES
        let lastTap = 0;
        let touchStartX = 0; let touchStartY = 0;
        const pWrapper = document.getElementById('pWrapper');

        pWrapper.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                x < rect.width / 2 ? skip(-10) : skip(10);
            } else {
                setTimeout(() => { if(Date.now() - lastTap >= 300) togglePlay(); }, 305);
            }
            lastTap = now;
        });

        pWrapper.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        pWrapper.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: true});

        function handleSwipe(startX, startY, endX, endY) {
            let diffX = endX - startX;
            let diffY = endY - startY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 50) diffX > 0 ? skip(10) : skip(-10);
            } else {
                if (Math.abs(diffY) > 50) {
                    let newVol = vid.volume + (diffY > 0 ? -0.2 : 0.2);
                    newVol = Math.max(0, Math.min(1, newVol));
                    updateVolume(newVol);
                    document.getElementById('volSlider').value = newVol;
                }
            }
        }

        function skip(time) { 
            vid.currentTime += time; 
            const id = time > 0 ? 'seekRight' : 'seekLeft';
            const overlay = document.getElementById(id);
            overlay.style.opacity = "1";
            setTimeout(() => overlay.style.opacity = "0", 400);
        }

        // PROGRESS & BUFFERING
        vid.onwaiting = () => document.getElementById('buffer').style.display = 'block';
        vid.onplaying = () => document.getElementById('buffer').style.display = 'none';
        vid.onended = () => { if(document.getElementById('autoplay').checked && nextVideoId) openPlayer(nextVideoId); };

        vid.ontimeupdate = () => {
            const pct = (vid.currentTime / vid.duration) * 100;
            document.getElementById('pFill').style.width = pct + "%";
            document.getElementById('curTime').innerText = formatTime(vid.currentTime);
            document.getElementById('durTime').innerText = formatTime(vid.duration || 0);
        };

        document.getElementById('pContainer').onclick = (e) => {
            e.stopPropagation(); 
            vid.currentTime = (e.offsetX / e.target.offsetWidth) * vid.duration;
        };

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? "0" + sec : sec);
        }

        // CUSTOM CONTEXT MENU
        function showMenu(e) {
            e.preventDefault();
            const menu = document.getElementById('customMenu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }
        window.onclick = (e) => { if(!e.target.closest('#customMenu')) document.getElementById('customMenu').style.display = 'none'; };

        init();
    </script>
</body>
</html>
